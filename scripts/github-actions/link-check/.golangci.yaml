version: "2"
linters:
  default: all
  disable:
    - cyclop # okay for a small script
    - err113 # okay for a small script
    - exhaustruct # okay for a small script
    - funlen # okay for a small script
    - gochecknoglobals # okay for a small script
    - goconst # okay for a small script
    - mnd # okay for a small script
    - paralleltest # okay for a small script
    - perfsprint # okay for a small script
    - varnamelen # okay for a small script

    - depguard # internal packages are the script's own implementation, not a general dependency boundary
    - testpackage # same-package tests are acceptable for this small standalone module

    - nlreturn # I disagree with the linter
    - noinlineerr # I disagree with the linter
    - wsl # I disagree with the linter
    - wsl_v5 # I disagree with the linter
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G101
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: unused-parameter
          arguments:
            - allowRegex: ^_
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - lll
        path: _test.go
      - linters:
          - gosec
        text: G704
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/favonia/cloudflare-ddns)
  exclusions:
    generated: lax
