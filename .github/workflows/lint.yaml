name: Lint

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  golangci-core:
    name: "Go: core"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: golangci-lint

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
      - name: 📡 Run `go telemetry on`
        run: |
          go telemetry on
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🧹 Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

  golangci-scripts:
    name: "Go: scripts (${{ matrix.module.name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - name: "doc watch"
            directory: scripts/github-actions/cloudflare-doc-watch
          - name: "token verify watch"
            directory: scripts/github-actions/cloudflare-token-verify-watch
          - name: "link check"
            directory: scripts/github-actions/link-check
          - name: "smoke test"
            directory: scripts/github-actions/smoke-test
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: golangci-lint
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: ${{ matrix.module.directory }}/go.mod
      - name: 📡 Run `go telemetry on`
        run: |
          go telemetry on
      - name: 🧹 Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: ${{ matrix.module.directory }}

  actionlint:
    name: GitHub Actions (actionlint)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: go-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
      - name: 📡 Run `go telemetry on`
        run: |
          go telemetry on
      - name: 🔎 Check shellcheck availability
        run: |
          command -v shellcheck
      - name: 🧹 Run actionlint
        run: |
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          actionlint -shellcheck shellcheck
        continue-on-error: false
        env:
          # renovate: datasource=go depName=github.com/rhysd/actionlint versioning=semver
          ACTIONLINT_VERSION: v1.7.12
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  zizmor:
    name: GitHub Actions (zizmor)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: github-hosted-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🧹 Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

  hadolint:
    name: Dockerfile
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: github-hosted-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🧹 Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  yamlfmt:
    name: YAML
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: go-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
      - name: 📡 Run `go telemetry on`
        run: |
          go telemetry on
      - name: 🧹 Run yamlfmt
        run: |
          go install "github.com/google/yamlfmt/cmd/yamlfmt@${YAMLFMT_VERSION}"
          yamlfmt .
        env:
          # renovate: datasource=go depName=github.com/google/yamlfmt versioning=semver
          YAMLFMT_VERSION: v0.21.0

  jq:
    name: JSON
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: github-hosted-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🧹 Run jq
        run: |
          status=0
          while IFS= read -r -d '' file; do
            tmp="$(mktemp)"
            if ! jq --indent 2 . "$file" >"$tmp"; then
              echo "Invalid JSON: $file" >&2
              rm -f "$tmp"
              status=1
              continue
            fi
            if ! diff -u "$file" "$tmp" >/dev/null; then
              echo "Not formatted: $file" >&2
              status=1
            fi
            rm -f "$tmp"
          done < <(git ls-files -z '*.json')
          exit "$status"

  mdformat:
    name: Markdown
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: python-tooling

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: .github/workflows/mdformat-requirements.txt
      - name: 📦️ Install mdformat
        run: python -m pip install --require-hashes --requirement .github/workflows/mdformat-requirements.txt
      - name: 🧹 Run mdformat
        run: git ls-files -z '*.md' '*.markdown' | xargs -0r python -m mdformat --check
