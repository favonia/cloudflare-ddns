name: GitHub Action Scripts

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.module.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - name: cloudflare-doc-watch
            directory: scripts/github-actions/cloudflare-doc-watch
          - name: cloudflare-token-verify-watch
            directory: scripts/github-actions/cloudflare-token-verify-watch
          - name: link-check
            directory: scripts/github-actions/link-check
          - name: smoke-test
            directory: scripts/github-actions/smoke-test
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: test.github-action-scripts
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: ${{ matrix.module.directory }}/go.mod
      - name: 📡 Run `go telemetry on`
        working-directory: ${{ matrix.module.directory }}
        run: |
          go telemetry on
      - name: 🧪 Run `go mod tidy -diff`
        working-directory: ${{ matrix.module.directory }}
        run: |
          go mod tidy -diff
      - name: 🧪 Run `go test`
        working-directory: ${{ matrix.module.directory }}
        run: |
          go test ./...

  lint:
    name: Lint (${{ matrix.module.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - name: cloudflare-doc-watch
            directory: scripts/github-actions/cloudflare-doc-watch
          - name: cloudflare-token-verify-watch
            directory: scripts/github-actions/cloudflare-token-verify-watch
          - name: smoke-test
            directory: scripts/github-actions/smoke-test
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: golangci-lint.github-action-scripts
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: ${{ matrix.module.directory }}/go.mod
      - name: 🧹 Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.3
          working-directory: ${{ matrix.module.directory }}
