name: Go

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: test
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
      - name: 📡 Run `go telemetry on`
        run: |
          go telemetry on
      - name: 🩺 Run `go vet`
        run: |
          go vet ./...
      - name: 🧪 Run `go mod tidy -diff`
        run: |
          go mod tidy -diff
      - name: 🧪 Run `go test`
        run: |
          coverpkg="$(go list ./... | grep -v "internal/mocks" | paste -sd,)"
          go test -json "-coverpkg=${coverpkg}" -coverprofile=coverage.txt -race ./... | tee test-report.jsonl
      - name: 📦️ Upload `go test -json` logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-test-json
          path: test-report.jsonl
      - name: ☂️ Report coverage rates to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          fail_ci_if_error: true # default: false
          file: ./coverage.txt
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

  fuzz:
    name: Fuzz (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: ${{ matrix.target.experimental }}
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: ${{ github.workflow }}-fuzz-${{ matrix.target.name }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target:
          - name: parse-list
            package: ./test/fuzzer
            fuzz: FuzzParseList
            fuzztime: "60s"
            parallel: 1
            experimental: false
          - name: parse-expression
            package: ./test/fuzzer
            fuzz: FuzzParseExpression
            fuzztime: "60s"
            parallel: 1
            experimental: false
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: test.fuzz
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
      - name: 🧪 Run `go mod tidy -diff`
        run: |
          go mod tidy -diff
      - name: 🧪 Run `go test -fuzz`
        run: |
          go test "${{ matrix.target.package }}" -fuzz "${{ matrix.target.fuzz }}" -fuzztime "${{ matrix.target.fuzztime }}" -parallel "${{ matrix.target.parallel }}" 2>&1 | tee "fuzz-${{ matrix.target.name }}.log"
      - name: 📦️ Upload fuzz logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-fuzz-${{ matrix.target.name }}
          path: fuzz-${{ matrix.target.name }}.log

  regenerate:
    name: Regenerate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: test.regenerate
      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
      - name: 🧪 Run `go mod tidy -diff`
        run: |
          go mod tidy -diff
      - name: 🧪 Run `go generate`
        run: |
          rm -rf ./internal/mocks
          go generate ./...
      - name: 🔍️ Check if any files are changed
        run: |
          if ! git diff --exit-code; then
            echo "Please run 'go gonerate ./...'"
            exit 1
          fi
