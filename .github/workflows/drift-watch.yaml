name: Watches

on:
  workflow_dispatch:
  schedule:
    - cron: "45 15 * * 5"

permissions:
  contents: read

jobs:
  doc-watch:
    name: Cloudflare docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: cloudflare-watch

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      - name: 🔎 Check the built-in Cloudflare drift watches
        working-directory: scripts/github-actions/cloudflare-doc-watch
        run: go run .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  token-verify-watch:
    name: Cloudflare tokens verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: cloudflare-watch

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: scripts/github-actions/cloudflare-token-verify-watch/go.sum

      - name: 🧪 Run /user/tokens/verify drift watch
        working-directory: scripts/github-actions/cloudflare-token-verify-watch
        run: go run .

  external-links:
    name: External URLs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: external-http-probing

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: scripts/github-actions/link-check/go.mod
      - name: 🌐 Probe external links
        working-directory: scripts/github-actions/link-check
        run: go run . external
