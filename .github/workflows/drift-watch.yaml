name: Watches

on:
  workflow_dispatch:
  schedule:
    - cron: "45 15 * * 5"

permissions:
  contents: read

jobs:
  doc-watch:
    name: Cloudflare docs
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: cloudflare-drift-watch.doc

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"

      - name: 🔎 Check the built-in Cloudflare drift watches
        working-directory: scripts/github-actions/cloudflare-doc-watch
        run: go run .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  token-verify-watch:
    name: Cloudflare tokens verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: cloudflare-drift-watch.token

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: scripts/github-actions/cloudflare-token-verify-watch/go.sum

      - name: 🧪 Run /user/tokens/verify drift watch
        working-directory: scripts/github-actions/cloudflare-token-verify-watch
        run: go run .

  external-links:
    name: External URLs
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-sudo: true
          policy: link-check.external

      - name: 🚚 Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: scripts/github-actions/link-check/go.mod
      - name: 🌐 Probe external links
        working-directory: scripts/github-actions/link-check
        run: go run . -mode external
