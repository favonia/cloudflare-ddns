name: Watches

on:
  workflow_dispatch:
  schedule:
    - cron: "45 15 * * 5"

permissions:
  contents: read

jobs:
  doc-watch:
    name: Cloudflare docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true
          policy: cloudflare-watch

      - name: 🚚 Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: 🔎 Check the built-in Cloudflare drift watches
        working-directory: scripts/github-actions/cloudflare-doc-watch
        run: go run .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auth-error-watch:
    name: Cloudflare auth-error behavior
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true
          policy: cloudflare-watch

      - name: 🚚 Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: scripts/github-actions/cloudflare-auth-error-watch/go.sum

      - name: 🧪 Run auth-error behavior watch
        working-directory: scripts/github-actions/cloudflare-auth-error-watch
        run: go run .

  external-links:
    name: External URLs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true
          policy: external-http-probing

      - name: 🚚 Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: scripts/github-actions/link-check/go.mod
      - name: 🌐 Probe external links
        working-directory: scripts/github-actions/link-check
        run: go run . external
